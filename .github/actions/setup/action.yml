name: Setup Node.js and pnpm
description: >
  Install Node.js 24 LTS, enable Corepack for pnpm resolution,
  configure dependency caching, and run pnpm install.

runs:
  using: composite
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Configure pnpm dependency cache
      if: hashFiles('pnpm-lock.yaml') != ''
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      if: hashFiles('pnpm-lock.yaml') != ''
      shell: bash
      run: pnpm install --frozen-lockfile
