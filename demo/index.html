<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sw-editor — Demo Harness</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { display: flex; flex-direction: column; height: 100vh; font-family: system-ui, sans-serif; }
      main { flex: 1; display: flex; overflow: hidden; }
    </style>
  </head>
  <body>
    <main>
      <sw-editor id="editor" style="width:100%;height:600px;"></sw-editor>

      <!-- Properties panel region — required by accessibility tests -->
      <aside role="region" aria-label="Properties panel"></aside>

      <!-- ARIA live region for screen-reader announcements -->
      <div aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>
    </main>

    <!-- Source editor: paste YAML or JSON to load a workflow -->
    <section style="padding:0.5rem;display:flex;flex-direction:column;gap:0.25rem;">
      <label for="source-input" style="font-size:0.75rem;font-weight:600;">Workflow source (YAML / JSON)</label>
      <textarea
        id="source-input"
        aria-label="Workflow source"
        rows="6"
        style="font-family:monospace;font-size:0.75rem;resize:vertical;width:100%;padding:0.25rem;"
        placeholder="Paste YAML or JSON workflow here…"
      ></textarea>
      <!-- Diagnostics output — updated by validation wiring in main.ts -->
      <div
        id="diagnostics"
        aria-label="Diagnostics"
        data-testid="diagnostics-live-region"
        aria-live="assertive"
        aria-atomic="true"
        style="min-height:1.5rem;font-size:0.75rem;color:#c0392b;white-space:pre-wrap;"
      ></div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
